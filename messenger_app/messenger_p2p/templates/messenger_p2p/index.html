<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P2P Messenger</title>
  <style>
    body { font-family: sans-serif; max-width: 620px; margin: 40px auto; padding: 0 16px; }
    h2 { margin-bottom: 4px; }
    #status { font-size: 13px; color: #666; margin-bottom: 12px; }
    #peers-list { font-size: 13px; color: #444; margin-bottom: 12px;
                  padding: 8px 12px; background: #f0f0f0; border-radius: 6px; }
    #messages { border: 1px solid #ccc; border-radius: 8px; height: 300px;
                overflow-y: auto; padding: 12px; margin-bottom: 12px; background: #fafafa; }
    .msg { margin: 6px 0; font-size: 14px; }
    .msg .label { font-weight: 600; margin-right: 6px; }
    .msg.sent .label { color: #4f46e5; }
    .msg.received .label { color: #0891b2; }
    .msg.system { color: #888; font-style: italic; }
    .msg.error { color: #dc2626; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type=text] { flex: 1; padding: 8px 10px; border: 1px solid #ccc;
                       border-radius: 6px; font-size: 14px; }
    button { padding: 8px 16px; border: none; border-radius: 6px;
             background: #4f46e5; color: white; cursor: pointer; font-size: 14px; }
    button:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>

  <h2>P2P Messenger</h2>
  <div id="status">Not connected.</div>
  <div id="peers-list">Online peers: none</div>

  <div class="row" id="login-row">
    <input id="username" type="text" placeholder="Your username" />
    <button onclick="connect()">Connect</button>
  </div>

  <div id="messages"></div>

  <div class="row">
    <input id="recipient" type="text" placeholder="To (username)" disabled />
    <input id="text-input" type="text" placeholder="Message..." disabled
           onkeydown="if(event.key==='Enter') send()" />
    <button id="send-btn" onclick="send()" disabled>Send</button>
  </div>

<script>
  let ws = null;
  let myName = "";
  // This is the client's own peer registry — the key P2P concept
  let knownPeers = [];

  function connect() {
    myName = document.getElementById("username").value.trim();
    if (!myName) return alert("Enter a username.");

    ws = new WebSocket("ws://" + window.location.host + "/ws/p2p/");

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "register", username: myName }));
      document.getElementById("status").textContent = `Connected as ${myName} (peer + listener)`;
      document.getElementById("login-row").style.display = "none";
      document.getElementById("recipient").disabled = false;
      document.getElementById("text-input").disabled = false;
      document.getElementById("send-btn").disabled = false;
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "peer_list") {
        // Client updates its own view of the network
        knownPeers = data.peers;
        updatePeersList();
        addMessage("", `Peers online: ${knownPeers.join(", ") || "none"}`, "system");

      } else if (data.type === "message") {
        // A peer sent us a message directly
        addMessage(data.from, data.text, "received");

      } else if (data.type === "error") {
        addMessage("error", data.text, "error");
      }
    };

    ws.onclose = () => {
      document.getElementById("status").textContent = "Disconnected.";
      addMessage("", "You have been disconnected.", "system");
    };
  }

  function send() {
    const recipient = document.getElementById("recipient").value.trim();
    const text = document.getElementById("text-input").value.trim();
    if (!text || !ws) return;

    if (!recipient) return alert("Enter a recipient.");

    // Client decides the routing — not the server
    if (!knownPeers.includes(recipient)) {
      addMessage("error", `'${recipient}' is not in your peer list.`, "error");
      return;
    }

    ws.send(JSON.stringify({ type: "message", to: recipient, text: text }));
    addMessage(`you → ${recipient}`, text, "sent");
    document.getElementById("text-input").value = "";
  }

  function updatePeersList() {
    document.getElementById("peers-list").textContent =
      "Online peers: " + (knownPeers.length ? knownPeers.join(", ") : "none");
  }

  function addMessage(label, text, type) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerHTML = label
      ? `<span class="label">${label}:</span>${text}`
      : `<em>${text}</em>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>

</body>
</html>
